		<div class="name_page">Контрольные вопросы</div><br>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">1. Что такое информация?</t> <a class="btn_otvet">ответ</a><div class="otvet">Информация — осознанные сведения об окружающем мире, которые являются объектом хранения, преобразования, передачи и использования.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">2. Что такое информатика?</t> <a class="btn_otvet">ответ</a><div class="otvet">Информация — наука, изучающая структуру, общие свойства и методы передачи информации, в том числе связанной с применением ЭВМ.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">3. Что такое данные?</t> <a class="btn_otvet">ответ</a><div class="otvet">Данные — это совокупность сведений, зафиксированных на определенном носителе в форме, пригодной для постоянного хранения, передачи и обработки. Преобразование и обработка данных позволяет получить информацию.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">4. Что такое информационные технологии?</t> <a class="btn_otvet">ответ</a><div class="otvet">Информационная технология — это процесс, использующий совокупность средств и методов сбора, обработки и передачи данных для получения информации нового качества о состоянии объекта, процесса или явления. Цель информационной технологии — производство информации для ее .анализа человеком и принятия на его основе решения по выполнению какого-либо действия.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">5. Какими основными свойствами характеризуются информационные технологии?</t> <a class="btn_otvet">ответ</a><div class="otvet">Информационные технологии — широкий класс дисциплин и областей деятельности, относящихся к технологиям управления и обработки данных, а также создания данных, в том числе, с применением вычислительной техники.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">6. Что изучает кибернетика?</t> <a class="btn_otvet">ответ</a><div class="otvet">Кибернетика — наука об общих закономерностях процессов управления и передачи информации в машинах, живых организмах и обществе.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">7. Проблемы информатизации общества.</t> <a class="btn_otvet">ответ</a><div class="otvet">Проблемы индустриализации производства и обработки информации, т.е. проблемы создания и развития крупного машинного производства в информационной сфере, порождены противоречием между необходимостью своевременного использования во всех сферах человеческой деятельности больших объемов высококачественной информации и невозможностью оперативно формировать такие объемы с помощью традиционных информационных средств, технологий и средств связи. В эту группу входят материально-техническая, технологическая проблемы и проблема связи.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">8. Каковы основные свойства информации?</t> <a class="btn_otvet">ответ</a><div class="otvet">С точки зрения информатики наиболее важными представляются следующие общие качественные свойства: достоверность, полнота, точность, актуальность, полезность, ценность, своевременность, понятность, доступность, краткость и пр.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">9. Что такое информационное общество?</t> <a class="btn_otvet">ответ</a><div class="otvet">Информационное общество — это общество, в котором социально-экономическое развитие зависит, прежде всего, от производства, переработки, хранения, распространения информации среди членов общества.</div></label></div>
		<div class="spoiler"><label><input type="checkbox"><t style="font-weight: 600">10. Назовите основные составные части информатики.</t> <a class="btn_otvet">ответ</a><div class="otvet">Основу современной информатики образуют три составные части: Теоретическая информатика, Средства информатизации, Информационные системы и технологии.</div></label></div>
