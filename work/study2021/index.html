<html>
	<head>
		<link rel="shortcut icon" href="favicon.png" type="image/x-icon"/>
		<title>Учебник</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link href="style.css" rel="stylesheet">
		<link rel="stylesheet" href="../../fonts/FontAwesome/css/all.css">
	</head>
	<body>
		<div scale class="scrollup" onclick="window.scrollTo({top:0,behavior:'smooth'});"><center><i class="fas fa-angle-double-up"></i></center></div>
		<div class="loader"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
		<div class="head">
			<div>
				<div class="buttons" inline>
					<div scale class="icon-button" prompt="Главная" onclick="window.open(window.location.origin + window.location.pathname, '_top');"><span><i class="far fa-books"></i></span></div>
				</div>
				<div class="headmenu buttons" inline></div>
				<div class="buttons" inline>
					<div scale tabindex="0" class="icon-button" prompt="Настройки"><span><i class="far fa-cogs"></i></span>
						<div class="tooltip">
							<div class="buttons">
								<div line>Общее</div>
								<div scale icon class="secondary-button" onclick="localStorage.clear(); location.reload();"><span icon="&#xf65f">Сбросить сохранённые данные</span></div>
								<div scale icon class="secondary-button" onclick="changeSettings({type: 'theme'}, true);"><span icon="&#xf672">Переключить тему</span></div>
								<div scale icon class="secondary-button" onclick="window.open('https://dobriy-vecher-vlad.github.io/', '_blank');"><span icon="&#xf126">dobriy-vecher-vlad.github.io</span></div>
								<div line>Type of buttons</div>
								<div scale class="extra-button"><span>Extra button</span></div>
								<div scale class="primary-button"><span>Primary button</span></div>
								<div scale class="secondary-button"><span icon="&#xf672">Secondary button</span></div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="description"></div>
		<div class="main">
			<div class="leftmenu" data-logo="Меню"></div>
			<div class="middle"></div>
		</div>
		<script> </script>
		<script type="text/javascript" src="values.js"></script>
		<script type="text/javascript" src="functions.js"></script>
		<script>
		</script>
	</body>
</html>
