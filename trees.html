<html>
	<head>
	    <link rel="shortcut icon" href="./image/favicon.png" type="image/x-icon"/>
		<title>Repos GitHub</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<link id="stylesheet" href="trees.css" rel="stylesheet" type="text/css">
		<link rel="stylesheet" href="./fonts/FontAwesome/css/all.css">
		<link rel="stylesheet" href="https://unpkg.com/tachyons@4.6.1/css/tachyons.min.css">
	</head>
	<body>
		<div id="repos" class="fw5"><div class="fw8 f3">–Я–∞—А—Б–µ—А —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П GitHub</div><br><a type="name" target="_blank"></a></div>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
		<script src="https://use.fortawesome.com/cffe9124.js"></script>
		<script src="https://use.fortawesome.com/353d6a51.js"></script>
		<script src="https://use.fortawesome.com/7abfb655.js"></script>
		<script src="https://use.fortawesome.com/0cb6f571.js"></script>
		<script src="https://use.fortawesome.com/9ddbb998.js"></script>
		<script>
		var access_token = '1ce8d5b3df1e0c1932'
		access_token += '3555ff1ba25cceb0cc615d';
		var name = 'dobriy-vecher-vlad/dobriy-vecher-vlad.github.io/';
		//test var name = 'VKCOM/vk-php-sdk/';
		//limit https://api.github.com/rate_limit?access_token=
		document.querySelector('a[type=name]').setAttribute('href', 'https://github.com/'+name);
		document.querySelector('a[type=name]').innerHTML = name;
		$(window).on('load', function() {
			$.ajax({
				type: "GET",
				url: "https://api.github.com/repos/"+name+"branches/master?access_token="+access_token+"",
				dataType: "json",
				success: function(response) {
					getrepos('#repos', response.commit.sha, '');
				}
			});
		});
		function getrepos(div, sha, types) {
			$.ajax({
				type: "GET",
				url: "https://api.github.com/repos/"+name+"git/trees/"+sha+"?access_token="+access_token+"",
				dataType: "json",
				success: function(response) {
					document.querySelector(div).removeAttribute('onclick');
					var html = '';
					html += '<ul type="'+types+'" class="treeCSS" id="sha_'+response.sha+'">';
					for (var x = 0; x < response.tree.length; x++) {
						var data = response.tree[x];
						var type = types + data.path;
						var onclick = data.type == 'tree' ? 'getrepos(`#sha_'+data.sha+'`, `'+data.sha+'`, `'+type+'/`);' : '';
						var hrefs = data.type == 'tree' ? data.path : '<a href="https://github.com/'+name+'blob/master/'+type+'" target="_blank">'+data.path+'</a>';
						html += '<li id="sha_'+data.sha+'" onclick="'+onclick+'"><div class="tree" type="'+data.type+'"></div>'+hrefs+'</li>';
						
					}
					html += '<li>–Т—Б–µ–≥–Њ —Д–∞–є–ї–Њ–≤:'+response.tree.length+'</li>';
					html += '</ul>';
					document.querySelector(div).insertAdjacentHTML('beforeend', html);
				}
			});
		}
		</script>
	</body>
</html>
